name: Build and Release APKs

on:
  # 1. Triggers when you push a version tag (e.g., git tag v1.0.0 && git push origin v1.0.0)
  push:
    tags:
      - 'v*'
  # 2. Allows manual triggering from the Actions tab with a custom version name
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release Version Tag (e.g., v1.0.1)'
        required: true
        default: 'v1.0.0'

# CRITICAL: This permission is required for GitHub Actions to create a Release
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- BUILD STEP ---
      # This generates separate, lightweight APKs for each architecture
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      # (Optional) If you decided to use your keystore secrets, put the Decode and key.properties steps right here!

      # --- RELEASE STEP ---
      # Pushes the APKs to the GitHub Releases tab
      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          # Uses the pushed tag name, or the manual input name
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version_tag }}
          name: Release ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version_tag }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/ReciteQuran-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/ReciteQuran-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/ReciteQuran-x86_64-release.apk
